name: Build iOS Dev Client (Unsigned)

on:
  workflow_dispatch:
    inputs:
      expo_sdk_version:
        description: "Expo SDK version (for caching)"
        required: false
        default: "54"

jobs:
  build-ios:
    name: Build iOS Dev Shell
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 👇 --- 复制并插入这几行代码 --- 👇
      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"
      # 👆 --- 复制并插入这几行代码 --- 👆

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo CLI
        run: npm install -g expo-cli eas-cli

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Build unsigned .app bundle
        working-directory: ios
        run: |
          xcodebuild \
            -workspace SmartHike.xcworkspace \
            -scheme SmartHike \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            ENABLE_BITCODE=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Locate .app bundle
        id: locate-app
        run: |
          APP_PATH=$(find ios/build -name "SmartHike.app" -type d | head -1)
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Found .app at: $APP_PATH"

      - name: Create Payload directory for .ipa
        run: |
          mkdir -p Payload
          cp -R "${{ steps.locate-app.outputs.app_path }}" Payload/

      - name: Package as .ipa
        run: |
          zip -r SmartHike-dev-unsigned.ipa Payload

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartHike-dev-ios
          path: SmartHike-dev-unsigned.ipa
          retention-days: 30
          if-no-files-found: error
